name: Deploy to WordPress.org
on:
  push:
    tags:
      - "*"
jobs:
  plugin_meta:
    uses: krokedil/krokedil-wp-ci/.github/workflows/get-plugin-meta.yml@v1

  tag:
    name: New tag
    runs-on: ubuntu-latest
    needs: plugin_meta
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Build plugin for production use
      - name: Plugin production build steps
        run: npm run build:prod

      # Install SVN ( Subversion )
      - name: Install SVN ( Subversion )
        run: |
          sudo apt-get update
          sudo apt-get install subversion

      # Deploy to WordPress.org
      - name: WordPress Plugin Deploy
        uses: 10up/action-wordpress-plugin-deploy@54bd289b8525fd23a5c365ec369185f2966529c2 # v2.3.0
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SLUG: ${{ needs.plugin_meta.outputs.plugin_slug }}
